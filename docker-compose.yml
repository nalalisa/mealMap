services:
  mysql:
    image: mysql:8.4
    container_name: mealmap-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mealmap
      MYSQL_USER: mealmap
      MYSQL_PASSWORD: mealmap1234
      MYSQL_ROOT_PASSWORD: root1234
    ports:
      - "3307:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 12

  adminer:
    image: adminer:4
    container_name: mealmap-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"
